# SentiNet device simulation
#
# Start from this folder:
#   docker compose up -d
#
# Or from the repo root:
#   docker compose -f simulation/docker-compose.yml up -d
#
# Scan:
#   sudo nmap -sT -sV --open -T4 172.20.0.0/24

networks:
  sentinet_lab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

x-device-base: &device-base
  image: python:3.11-slim
  restart: unless-stopped
  command:
    - python3
    - -c
    - |
      import os
      import socket
      import threading
      import time

      DEVICE_NAME = os.environ.get("DEVICE_NAME", "SentiNet Device")
      MANUFACTURER = os.environ.get("MANUFACTURER", "SentiNet")
      FIRMWARE = os.environ.get("FIRMWARE", "Unknown")
      PORTS = os.environ.get("PORTS", "80:http")

      BANNERS = {
          "http": (
              "HTTP/1.1 200 OK\r\n"
              f"Server: {MANUFACTURER} Embedded Web\r\n"
              f"X-Device: {DEVICE_NAME}\r\n"
              f"X-Firmware: {FIRMWARE}\r\n"
              "Content-Type: text/html\r\n\r\n"
              f"<html><body><h1>{MANUFACTURER}</h1>"
              f"<p>Model: {DEVICE_NAME}</p>"
              f"<p>Firmware: {FIRMWARE}</p></body></html>"
          ).encode(),
          "rtsp": f"RTSP/1.0 200 OK\r\nServer: {MANUFACTURER} RTSP\r\n\r\n".encode(),
          "ipp": b"HTTP/1.1 200 OK\r\nContent-Type: application/ipp\r\n\r\nIPP Ready",
          "raw": b"@PJL INFO STATUS\r\nCODE=10001\r\nDISPLAY=Ready\r\n",
          "upnp": f"HTTP/1.1 200 OK\r\nST: upnp:rootdevice\r\nServer: {MANUFACTURER} UPnP/1.1\r\n\r\n".encode(),
          "ssh": f"SSH-2.0-{MANUFACTURER.replace(' ', '_')}_SSH_8.9\r\n".encode(),
          "smb": b"\x00\x00\x00\x85\xffSMBr",
          "rdp": b"\x03\x00\x00\x13\x0e\xd0\x00\x00\x124\x00\x02\x01\x08\x00\x02\x01\x00",
          "telnet": f"{MANUFACTURER} login: ".encode(),
          "ftp": f"220 {MANUFACTURER} FTP ready\r\n".encode(),
      }

      def serve(port, kind):
          banner = BANNERS.get(kind, f"{DEVICE_NAME} {kind}\r\n".encode())
          sock = socket.socket()
          sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          sock.bind(("0.0.0.0", int(port)))
          sock.listen(20)
          print(f"{DEVICE_NAME}: listening on {port}/{kind}", flush=True)
          while True:
              conn, _ = sock.accept()
              try:
                  conn.settimeout(1)
                  try:
                      conn.recv(1024)
                  except Exception:
                      pass
                  try:
                      conn.sendall(banner)
                  except (BrokenPipeError, ConnectionResetError, OSError):
                      pass
              finally:
                  conn.close()

      for spec in PORTS.split(","):
          port, kind = spec.split(":", 1)
          threading.Thread(target=serve, args=(port.strip(), kind.strip()), daemon=True).start()

      while True:
          time.sleep(60)

services:
  camera_hikvision:
    <<: *device-base
    container_name: sentinet_camera_1
    hostname: hikvision-cam-01
    networks:
      sentinet_lab:
        ipv4_address: 172.20.0.101
    environment:
      DEVICE_NAME: Hikvision DS-2CD2143
      FIRMWARE: V5.4.0 build 160401
      MANUFACTURER: Hikvision
      PORTS: 80:http,554:rtsp,23:telnet

